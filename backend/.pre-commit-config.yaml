repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [ --fix, --config, backend/pyproject.toml ]
      - id: ruff-format
        args: [ --config, backend/pyproject.toml ]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ["-c", "backend/pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]

  - repo: local
    hooks:
      - id: check-file-length
        name: check-file-length (max 500 linhas — Clean Code regra 7)
        entry: uv run python backend/scripts/check_file_length.py
        language: system
        types: [python]

      - id: xenon
        name: xenon (complexidade ciclomatica)
        entry: uv run xenon
        language: system
        args:
          - --max-absolute
          - B
          - --max-modules
          - A
          - --max-average
          - A
          - backend/financas/
        pass_filenames: false
        types: [python]
