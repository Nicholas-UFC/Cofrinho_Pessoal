services:
  db:
    image: postgres:16
    container_name: cofrinho_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cofrinho_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      TIME_ZONE: ${TIME_ZONE}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      WAHA_API_URL: ${WAHA_API_URL}
      WAHA_API_KEY: ${WAHA_API_KEY}
      WAHA_GROUP_ID: ${WAHA_GROUP_ID}
      WAHA_SESSION: ${WAHA_SESSION}
      WAHA_OWNER_USERNAME: ${WAHA_OWNER_USERNAME}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cofrinho_frontend
    environment:
      VITE_API_URL: ${VITE_API_URL}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  waha:
    image: devlikeapro/waha
    container_name: cofrinho_waha
    environment:
      WHATSAPP_DEFAULT_ENGINE: NOWEB
      WHATSAPP_API_KEY: ${WAHA_API_KEY}
      WHATSAPP_HOOK_URL: http://backend:8000/api/whatsapp/webhook/
      WHATSAPP_HOOK_EVENTS: message.any
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - waha_data:/app/.sessions
    depends_on:
      - backend

volumes:
  postgres_data:
  waha_data:
